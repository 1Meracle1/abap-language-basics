name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: node scripts/check-version.mjs "${GITHUB_REF_NAME}"
      - run: xvfb-run -a npm test
      - run: npm run verify:package
      - uses: actions/upload-artifact@v4
        with:
          name: abap-language-basics-${{ github.ref_name }}
          path: dist/*.vsix
          if-no-files-found: error

  github-release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: abap-language-basics-${{ github.ref_name }}
          path: dist
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${GITHUB_REF_NAME}" dist/*.vsix --repo "${GITHUB_REPOSITORY}" --verify-tag --generate-notes

  open-vsx:
    needs: build
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - uses: actions/download-artifact@v4
        with:
          name: abap-language-basics-${{ github.ref_name }}
          path: dist
      - name: Publish to Open VSX
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: npx ovsx publish dist/*.vsix
